<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Prompt para Vocabulário com Imagens</title>
</head>
<body>

<!-- Campo para inserir o texto de referência -->
<label for="textoInput">Texto de Referência (Base para o Vocabulário):</label><br>
<textarea id="textoInput" rows="10" cols="70">
Adicione o texto aqui!
</textarea>
<br><br>

<!-- Seletor de nível de inglês -->
<label for="englishLevel">Nível de Inglês (CEFR):</label>
<select id="englishLevel">
  <option value="Starter">Starter (antes do A1)</option>
  <option value="A1">A1 - Iniciante</option>
  <option value="A2">A2 - Básico</option>
  <option value="B1">B1 - Intermediário</option>
  <option value="B2">B2 - Intermediário Superior</option>
  <option value="C1">C1 - Avançado</option>
  <option value="C2">C2 - Proficiência</option>
</select>
<br><br>

<!-- Botão para gerar o prompt de vocabulário -->
<button onclick="gerarPromptVocabulario()">Gerar Prompt (Vocabulário c/ Imagens)</button>
<br><br>

<!-- Área para exibir o prompt de vocabulário -->
<label for="promptOutputWords">Prompt Gerado (Vocabulário):</label><br>
<textarea id="promptOutputWords" rows="18" cols="80"></textarea>

<script>
function gerarPromptVocabulario() {
  const text = document.getElementById("textoInput").value.trim();
  const englishLevel = document.getElementById("englishLevel").value;

  /*
    Prompt para a IA criar:
    - 3 grupos de 6 palavras cada (total de 18 palavras),
      cada grupo em um arquivo (words1.txt, words2.txt, words3.txt),
    - Cada palavra em CAIXA ALTA, uma por linha,
    -  imagens (imagem1.png ... imagem18.png), cada uma associada a uma palavra,
      e fornecer uma descrição clara de como a imagem deve ser ilustrada
      (para gerar as imagens posteriormente em uma ferramenta de IA ou designer).
  */

  const promptWords = `
Você é um gerador de vocabulário e de descrições para imagens em um curso de inglês, nível ${englishLevel}.
A partir do texto abaixo, escolha 3 grupos de 6 palavras cada (total de 18 palavras), relevantes e úteis para aprendizagem no nível ${englishLevel} do CEFR.

**Instruções detalhadas**:
1. Cada grupo de 6 palavras deve ser colocado em um arquivo separado:
   - words1.txt (6 palavras),
   - words2.txt (6 palavras),
   - words3.txt (6 palavras).
2. Em cada arquivo (words1.txt, words2.txt, words3.txt), escreva todas as palavras em CAIXA ALTA, uma palavra por linha.
3. Cada palavra terá uma imagem associada.
4. Para cada palavra, forneça uma descrição detalhada do que a imagem deve mostrar (para auxiliar na criação/ilustração da imagem). 
   - A descrição deve ser clara e representar bem a palavra em contexto visual.
   - Exemplo de formatação:
     PALAVRA: [descrição da imagem]
5. Não inclua comentários além desse formato. Foque em:
   - Listar as palavras em cada arquivo .txt
   - Apresentar a correspondência das palavras com as imagens e sua descrição visual
6. Ao final, apresente a lista completa das 18 palavras com a respectiva descrição de como deve ser a imagem.

--- Texto de Referência ---
${text}
--- Fim do Texto ---

Agora, gere:
- O conteúdo de words1.txt, words2.txt e words3.txt,
- A lista das PALAVRAS, cada uma associada à sua descrição visual.
`.trim();

  document.getElementById("promptOutputWords").value = promptWords;
}
</script>

</body>
</html>
