<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Prompt de Story Cards Bíblicos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 600px;
    }
    label {
      display: inline-block;
      width: 200px;
      margin-bottom: 8px;
    }
    input, select, button, textarea {
      margin-bottom: 10px;
      width: 100%;
    }
    textarea {
      height: 200px;
    }
    .button-container {
      text-align: right;
    }
  </style>
</head>
<body>
  <h1>Gerador de Prompt para Story Cards Bíblicos</h1>
  
  <label for="storyName">Nome da História Bíblica:</label>
  <input type="text" id="storyName" placeholder="Ex: A Queda de Adão e Eva" />

  <label for="biblicalReference">Referência Bíblica:</label>
  <input type="text" id="biblicalReference" placeholder="Ex: Gênesis 3" />

  <label for="englishLevel">Nível de Inglês (CERF):</label>
  <select id="englishLevel">
    <option value="Starter">Starter (mais fácil de todos, antes do A1)</option>
    <option value="A1">A1 - Iniciante</option>
    <option value="A2">A2 - Básico</option>
    <option value="B1">B1 - Intermediário</option>
    <option value="B2">B2 - Intermediário Superior</option>
    <option value="C1">C1 - Avançado</option>
    <option value="C2">C2 - Proficiência</option>
  </select>

  <label for="grammarFocus">Foco Gramatical ou Vocabulário:</label>
  <input type="text" id="grammarFocus" placeholder="Ex: Perguntas com am/is/are" />

  <div class="button-container">
    <button onclick="generatePrompt()">Gerar Prompt</button>
  </div>

  <label for="promptOutput">Prompt Gerado:</label>
  <textarea id="promptOutput" readonly></textarea>

  <script>
    function generatePrompt() {
      const storyName = document.getElementById('storyName').value.trim();
      const biblicalReference = document.getElementById('biblicalReference').value.trim();
      const englishLevel = document.getElementById('englishLevel').value;
      const grammarFocus = document.getElementById('grammarFocus').value.trim();

      // Montagem do Prompt
      const promptText = `
PROMPT DEFINITIVO PARA GERAÇÃO DE STORY CARDS BÍBLICOS

Objetivo:
Gere um arquivo de texto (images.txt) contendo 10 Story Cards para ensinar uma história bíblica e seus valores cristãos (objetivo principal é contar corretamente a história bíblica), ao mesmo tempo em que apresenta elementos do inglês que serão trabalhados durante a unidade. 

Cada card deve conter:
1. Uma frase narrativa curta e objetiva sobre a história bíblica, destacando seus ensinamentos cristãos.
2. Um elemento gramatical ou de vocabulário que será estudado na unidade.

Formato do arquivo (images.txt) que a IA deve gerar:

#title: ${storyName} Story Cards (${biblicalReference})

#imagem1
"[Texto do primeiro card - Introdução da história, apresentação do cenário e personagens.]"

#imagem2
"[Texto do segundo card - Desenvolvimento inicial da história.]"

#imagem3
"[Texto do terceiro card - Começo do conflito ou ponto de virada.]"

#imagem4
"[Texto do quarto card - Conflito se intensifica, desafio maior aparece.]"

#imagem5
"[Texto do quinto card - Consequência do conflito, personagens enfrentam a situação.]"

#imagem6
"[Texto do sexto card - Clímax da história, maior tensão do enredo.]"

#imagem7
"[Texto do sétimo card - Resolução do problema começa a se desenvolver.]"

#imagem8
"[Texto do oitavo card - Ensinamento de Deus na história, reflexão cristã começa.]"

#imagem9
"[Texto do nono card - Lição bíblica principal, impacto na vida dos personagens.]"

#imagem10
"[Texto do décimo card - Conclusão, conexão com a vida do aluno e chamada à reflexão.]"


Parâmetros para a Geração dos Cards:
- História Bíblica: ${storyName}
- Referência Bíblica: ${biblicalReference}
- Nível de Inglês (CERF): ${englishLevel}
- Foco Gramatical ou de Vocabulário: ${grammarFocus}
- Tom do Texto: Simples, direto e adequado ao nível de inglês escolhido (${englishLevel}). Frases curtas e acessíveis.

Regras:
- O primeiro card deve apresentar a história e seu contexto.
- Os cards seguintes devem seguir a sequência natural da história bíblica.
- O clímax deve ocorrer entre os cards 5 e 6.
- Os últimos cards devem trazer a reflexão cristã e a moral da história.
- Cada card deve ter frases curtas, no nível de inglês especificado.
- O tema gramatical ou de vocabulário deve aparecer naturalmente no texto.
- O arquivo deve estar no formato images.txt, garantindo que o app possa lê-lo corretamente.

Observação:
O principal objetivo é a história bíblica e seus valores cristãos. O segundo objetivo é ensinar inglês no nível ${englishLevel}, com foco em ${grammarFocus}.
      `;

      // Insere o prompt no textarea
      document.getElementById('promptOutput').value = promptText.trim();
    }
  </script>
</body>
</html>
